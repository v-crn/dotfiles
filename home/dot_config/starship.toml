# starship.toml — Cross-shell prompt configuration
# https://starship.rs/config/
#
# Layout: 2-line prompt with right-prompt
#
#   [user@host] ~/projects/app  main +2 ~1  v20  3s
#   ❯
#                                               14:32:05  (right prompt)

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$fill\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$cmd_duration\
$line_break\
$character"""

right_format = """$status$time"""

# Increase timeout for slow git operations on large repos
command_timeout = 1000
scan_timeout = 30

# ---------------------------------------------------------------------------
# Appearance
# ---------------------------------------------------------------------------

[palettes.default]
base     = "#24273a"
surface0 = "#363a4f"
overlay0 = "#6e738d"
blue     = "#8aadf4"
green    = "#a6da95"
red      = "#ed8796"
yellow   = "#eed49f"
peach    = "#f5a97f"
pink     = "#f5bde6"
mauve    = "#c6a0f6"
teal     = "#8bd5ca"

palette = "default"

# ---------------------------------------------------------------------------
# Prompt character — changes color on error
# ---------------------------------------------------------------------------

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"

# ---------------------------------------------------------------------------
# Directory
# ---------------------------------------------------------------------------

[directory]
style            = "bold cyan"
read_only        = " 󰌾"
read_only_style  = "red"
truncation_length       = 4
truncation_symbol       = "…/"
truncate_to_repo        = true
home_symbol             = "~"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = " "
"Music"     = " "
"Pictures"  = " "

# ---------------------------------------------------------------------------
# Git
# ---------------------------------------------------------------------------

[git_branch]
symbol = " "
style  = "bold mauve"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
style     = "bold yellow"
format    = "([$all_status$ahead_behind]($style) )"
conflicted = "󰩌 "
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "󰋗 ${count}"
stashed    = " ${count}"
modified   = " ${count}"
staged     = " ${count}"
renamed    = "󰑕 ${count}"
deleted    = " ${count}"

[git_metrics]
disabled          = false
added_style       = "bold green"
deleted_style     = "bold red"
format            = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

# ---------------------------------------------------------------------------
# Fill — separates left modules from language/duration modules
# ---------------------------------------------------------------------------

[fill]
symbol = " "

# ---------------------------------------------------------------------------
# Language / runtime — shown only when detected in current directory
# ---------------------------------------------------------------------------

[nodejs]
symbol = " "
style  = "bold green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style  = "bold yellow"
format = "[${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"

[rust]
symbol = " "
style  = "bold peach"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style  = "bold teal"
format = "[$symbol($version )]($style)"

[docker_context]
symbol = " "
style  = "bold blue"
format = "[$symbol$context ]($style)"
only_with_files = true

# ---------------------------------------------------------------------------
# Command duration — shown for commands taking >= 2 seconds
# ---------------------------------------------------------------------------

[cmd_duration]
min_time          = 2000
style             = "bold yellow"
format            = "[ $duration]($style) "
show_notifications = false

# ---------------------------------------------------------------------------
# Right prompt: status code + time
# ---------------------------------------------------------------------------

[status]
disabled = false
style    = "bold red"
format   = "[$status ]($style)"
map_symbol = true

[time]
disabled    = false
style       = "bold overlay0"
format      = "[$time]($style)"
time_format = "%H:%M:%S"
utc_time_offset = "local"

# ---------------------------------------------------------------------------
# Username / Hostname — SSH or root only
# ---------------------------------------------------------------------------

[username]
style_user   = "bold green"
style_root   = "bold red"
format       = "[$user]($style)"
show_always  = false

[hostname]
ssh_only = true
style    = "bold blue"
format   = "[@$hostname]($style) "

# ---------------------------------------------------------------------------
# Disabled modules (improves performance and reduces noise)
# ---------------------------------------------------------------------------

[battery]
disabled = true

[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[terraform]
disabled = true

[vagrant]
disabled = true

[conda]
disabled = true

[nix_shell]
disabled = true

[spack]
disabled = true
